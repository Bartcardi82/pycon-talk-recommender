#cloud-config
package_update: true
packages:
  - python3-pip
  - python3-venv
  - git
  - curl
  - ubuntu-drivers-common
  - debian-keyring
  - debian-archive-keyring
  - apt-transport-https

write_files:
  - path: /etc/caddy/Caddyfile
    content: |
      {
        auto_https off
      }

      :443 {
        @auth {
          header Authorization "Bearer {env.VLLM_API_KEY}"
        }
        handle @auth {
          reverse_proxy localhost:8000
        }
        respond 401
      }

  - path: /opt/vllm/start.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -e

      vllm serve Salesforce/xLAM-2-32b-fc-r \
        --enable-auto-tool-choice \
        --tool-call-parser xlam \
        --tensor-parallel-size 1 \
        --max-model-len 16384 \
        --gpu-memory-utilization 0.95 \
        --host 0.0.0.0 \
        --port 8000

  - path: /etc/systemd/system/vllm.service
    content: |
      [Unit]
      Description=vLLM Inference Server
      After=network.target

      [Service]
      Type=simple
      ExecStart=/opt/vllm/start.sh
      Restart=on-failure
      RestartSec=30
      Environment="HUGGING_FACE_HUB_TOKEN=${huggingface_token}"

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/caddy.service.d/override.conf
    content: |
      [Service]
      Environment="VLLM_API_KEY=${api_key}"

runcmd:
  - mkdir -p /opt/vllm
  - ubuntu-drivers autoinstall
  - pip install "vllm>=0.6.5"
  - curl -1sLf https://dl.cloudsmith.io/public/caddy/stable/gpg.key | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  - curl -1sLf https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt | tee /etc/apt/sources.list.d/caddy-stable.list
  - apt-get update -qq
  - DEBIAN_FRONTEND=noninteractive apt-get install -y -qq caddy
  - systemctl daemon-reload
  - systemctl enable caddy
  - systemctl start caddy
  - systemctl enable vllm
  - reboot
